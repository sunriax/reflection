# Travis CI build pipeline
# --------------------------------------------

language: csharp
solution: ExceptionLib.sln
mono: none
dotnet: 3.1.301

addons:
  apt:
    packages:
      - zip
      - tar
      - gzip

before_script:
  - set -e
  - dotnet restore

script:
  - |
    if [ -z "$TRAVIS_TAG" ]
    then
      set -e
      dotnet build -c Release
      dotnet test /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:Exclude="[xunit*]*" /p:excludebyfile="**/*.Designer.cs"
      bash <(curl -s https://codecov.io/bash) -Z
    fi

before_deploy:
  - set -e
  - dotnet build -c Release -o ./output
  - zip ./Reflection.zip ./output/RaGae.ReflectionLib.dll ./output/RaGae.ReflectionLib.pdb ./output/RaGae.ReflectionLib.deps.json ./output/RaGae.ReflectionLib.json
  - tar cfvz ./Reflection.tar.gz ./output/RaGae.ReflectionLib.dll ./output/RaGae.ReflectionLib.pdb ./output/RaGae.ReflectionLib.deps.json ./output/RaGae.ReflectionLib.json

deploy:
  provider: releases
  overwrite: true
  api_key: $GITHUB_TOKEN
  file:
    - "./Reflection.zip"
    - "./Reflection.tar.gz"
    - "./output/RaGae.ReflectionLib.dll"
    - "./output/RaGae.ReflectionLib.json"
  skip_cleanup: true
  on:
    tags: true

after_deploy:
  - dotnet nuget push ./output/RaGae.Reflection.*.nupkg -k $NUGET_TOKEN -s https://api.nuget.org/v3/index.json